name: Draft race report update

on:
  repository_dispatch:
    types:
      - race-report-email
  workflow_dispatch:
    inputs:
      subject:
        description: Email subject or short label
        required: false
        default: Manual race report digest
      from:
        description: Sender label
        required: false
        default: manual workflow_dispatch
      digest_text:
        description: Paste the race report email body
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate update draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
        run: python scripts/generate_race_report_update.py

      - name: Validate generated front matter
        run: |
          ruby -ryaml -rdate -e 'Dir["_posts/*.md", "_events/*.md", "updates/tags/*/index.html"].each { |f| text=File.read(f); fm=text.split(/^---\s*$/)[1]; YAML.safe_load(fm, permitted_classes:[Date,Time], aliases:true) if fm }; puts "yaml ok"'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.6"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --destination tmp/_site

      - name: Create pull request
        id: create_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DIRIGO_AUTOMATION_TOKEN || github.token }}
          commit-message: Draft race report update
          title: Draft race report update
          body-path: tmp/race-report-pr-body.md
          branch: automation/race-report-${{ github.run_id }}
          delete-branch: true
          draft: true
          labels: |
            automated draft
            content

      - name: Handle PR creation permission limits
        if: steps.create_pr.outcome == 'failure'
        env:
          DRAFT_BRANCH: automation/race-report-${{ github.run_id }}
        run: |
          if git ls-remote --exit-code --heads origin "$DRAFT_BRANCH" >/dev/null; then
            echo "::warning::Draft branch '$DRAFT_BRANCH' was pushed, but creating a PR is blocked for the current token. Enable 'Allow GitHub Actions to create and approve pull requests' or set DIRIGO_AUTOMATION_TOKEN."
            exit 0
          fi
          echo "::error::create-pull-request failed before branch push. Failing the workflow to avoid hiding unrelated errors."
          exit 1
