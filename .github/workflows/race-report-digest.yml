name: Draft race report update

on:
  repository_dispatch:
    types:
      - race-report-email
  workflow_dispatch:
    inputs:
      subject:
        description: Email subject or short label
        required: false
        default: Manual race report digest
      from:
        description: Sender label
        required: false
        default: manual workflow_dispatch
      digest_text:
        description: Paste the race report email body
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch staged email payload
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ingest.branch != '' }}
        env:
          INGEST_BRANCH: ${{ github.event.client_payload.ingest.branch }}
          INGEST_PATH: ${{ github.event.client_payload.ingest.path }}
        run: |
          git fetch origin "${INGEST_BRANCH}:refs/remotes/origin/${INGEST_BRANCH}"
          mkdir -p tmp
          git show "origin/${INGEST_BRANCH}:${INGEST_PATH}" > tmp/email-ingest-payload.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate update draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
        run: |
          if [ -f tmp/email-ingest-payload.json ]; then
            python scripts/generate_race_report_update.py --payload-file tmp/email-ingest-payload.json
          else
            python scripts/generate_race_report_update.py
          fi

      - name: Guard generated change size
        run: |
          if [ ! -s tmp/generated-files.txt ]; then
            echo "No generated files were listed. Refusing to create an empty or unconstrained PR."
            exit 1
          fi

          file_count="$(grep -cve '^[[:space:]]*$' tmp/generated-files.txt)"
          if [ "$file_count" -gt 25 ]; then
            echo "Generated $file_count files, which is over the 25-file safety limit."
            cat tmp/generated-files.txt
            exit 1
          fi

          added_lines=0
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in
              _posts/*.md|_events/*.md|updates/tags/*/index.html|assets/images/email/*/*) ;;
              *)
                echo "Generated path is outside the PR allowlist: $path"
                exit 1
                ;;
            esac

            if [ ! -e "$path" ]; then
              echo "Generated path listed but missing: $path"
              exit 1
            fi

            if git ls-files --error-unmatch "$path" >/dev/null 2>&1; then
              lines="$(git diff --numstat -- "$path" | awk '{ added += $1 } END { print added + 0 }')"
            elif file "$path" | grep -qiE 'image|bitmap|jpeg|png|gif|webp|avif'; then
              lines=0
            else
              lines="$(wc -l < "$path" | tr -d ' ')"
            fi
            added_lines=$((added_lines + lines))
          done < tmp/generated-files.txt

          if [ "$added_lines" -gt 2000 ]; then
            echo "Generated $added_lines added text lines, which is over the 2000-line safety limit."
            cat tmp/generated-files.txt
            exit 1
          fi

          {
            echo "paths<<EOF"
            cat tmp/generated-files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: generated_guard

      - name: Validate generated front matter
        run: |
          ruby -ryaml -rdate -e 'Dir["_posts/*.md", "_events/*.md", "updates/tags/*/index.html"].each { |f| text=File.read(f); fm=text.split(/^---\s*$/)[1]; YAML.safe_load(fm, permitted_classes:[Date,Time], aliases:true) if fm }; puts "yaml ok"'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.6"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --destination tmp/_site

      - name: Create pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: Draft race report update
          title: Draft race report update
          body-path: tmp/race-report-pr-body.md
          branch: automation/race-report-${{ github.run_id }}
          delete-branch: true
          draft: true
          add-paths: ${{ steps.generated_guard.outputs.paths }}
          labels: |
            automated draft
            content

      - name: Delete staged email payload branch
        if: ${{ always() && github.event_name == 'repository_dispatch' && github.event.client_payload.ingest.branch != '' }}
        env:
          INGEST_BRANCH: ${{ github.event.client_payload.ingest.branch }}
        run: git push origin --delete "${INGEST_BRANCH}" || true
