name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Ensure ImageMagick
        run: |
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          fi

          if command -v magick >/dev/null 2>&1; then
            magick -version | head -n 1
          else
            convert -version | head -n 1
          fi

      - name: Restore optimization cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/image-opt-cache
          key: image-opt-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            image-opt-cache-v1-${{ runner.os }}-${{ github.ref_name }}-
            image-opt-cache-v1-${{ runner.os }}-

      - name: Determine changed image files
        id: changed_images
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" != "push" ]]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_paths="$(git diff --name-only HEAD^ HEAD -- assets/images || true)"
          changed_image_paths="$(printf '%s\n' "$changed_paths" | awk 'tolower($0) ~ /\.(jpg|jpeg|png|webp)$/')"
          count="$(printf '%s\n' "$changed_image_paths" | sed '/^$/d' | wc -l | tr -d '[:space:]')"
          files="$(printf '%s\n' "$changed_image_paths" | sed '/^$/d' | tr '\n' ' ')"

          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "files=${files}" >> "$GITHUB_OUTPUT"

      - name: Optimize built images
        env:
          IMAGE_OPTIMIZER_CACHE_DIR: ${{ runner.temp }}/image-opt-cache
        run: |
          if [[ "${{ steps.changed_images.outputs.count }}" != "0" ]]; then
            echo "Optimizing changed images only: ${{ steps.changed_images.outputs.files }}"
            bash scripts/optimize_site_images.sh _site ${{ steps.changed_images.outputs.files }}
          else
            echo "No changed images detected or non-push trigger; running full optimization pass."
            bash scripts/optimize_site_images.sh _site
          fi

      - name: Save optimization cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/image-opt-cache
          key: image-opt-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
