name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Ensure ImageMagick
        run: |
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          fi

          if command -v magick >/dev/null 2>&1; then
            magick -version | head -n 1
          else
            convert -version | head -n 1
          fi

      - name: Restore optimization cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/image-opt-cache
          key: image-opt-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            image-opt-cache-v1-${{ runner.os }}-${{ github.ref_name }}-
            image-opt-cache-v1-${{ runner.os }}-

      - name: Optimize built images
        env:
          IMAGE_OPTIMIZER_CACHE_DIR: ${{ runner.temp }}/image-opt-cache
        run: |
          echo "Running full optimization pass for the deploy artifact."
          bash scripts/optimize_site_images.sh _site

      - name: Verify artifact size
        run: |
          set -euo pipefail
          site_kb="$(du -sk _site | awk '{print $1}')"
          site_mb="$((site_kb / 1024))"
          file_count="$(find _site -type f | wc -l | tr -d '[:space:]')"
          echo "Built artifact size: ${site_mb}MB (${site_kb}KB) across ${file_count} files."

          if [[ "$site_kb" -gt 950000 ]]; then
            echo "Pages artifact exceeds 950MB safety threshold."
            exit 1
          fi

      - name: Save optimization cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/image-opt-cache
          key: image-opt-cache-v1-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1200000
