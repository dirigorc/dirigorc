{% assign contact_href = include.contact_href | default: '/join.html#membership-contact' %}
<footer class="site-footer" id="contact">
    <div>
        <a class="brand footer-brand" href="{{ '/' | relative_url }}">
            <img class="brand-logo" src="{{ '/assets/images/dirigo-logo-white.png' | relative_url }}" alt="">
            <span>
                <strong>Dirigo</strong>
                <small>Maine running club</small>
            </span>
        </a>
    </div>
    <div class="footer-links">
        {% if include.show_social != false %}
        <nav class="footer-social" aria-label="Social links">
            <a class="social-link social-link-instagram" href="https://www.instagram.com/dirigorc/" target="_blank"
                rel="noopener noreferrer" aria-label="Dirigo RC on Instagram">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path
                        d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm0 2A3.8 3.8 0 0 0 4 7.8v8.4A3.8 3.8 0 0 0 7.8 20h8.4a3.8 3.8 0 0 0 3.8-3.8V7.8A3.8 3.8 0 0 0 16.2 4H7.8Zm8.7 2.4a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2ZM12 7.2a4.8 4.8 0 1 1 0 9.6 4.8 4.8 0 0 1 0-9.6Zm0 2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6Z" />
                </svg>
            </a>
            <a class="social-link social-link-facebook" href="https://www.facebook.com/profile.php?id=61564665052852"
                target="_blank" rel="noopener noreferrer" aria-label="Dirigo RC on Facebook">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path
                        d="M14 8.4V6.8c0-.8.4-1.2 1.3-1.2h1.5V2.8c-.7-.1-1.5-.2-2.4-.2-2.9 0-4.8 1.7-4.8 4.8v1H6.8v3.2h2.8V22H14V11.6h2.8l.5-3.2H14Z" />
                </svg>
            </a>
            <a class="social-link social-link-strava" href="https://www.strava.com/clubs/139159" target="_blank"
                rel="noopener noreferrer" aria-label="Dirigo RC on Strava">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path
                        d="M15.387 17.944 13.298 13.828h-3.065L15.387 24l5.15-10.172h-3.066M10.463 8.229l2.836 5.598h4.172L10.463 0l-7 13.828h4.169" />
                </svg>

        </nav>
        {% endif %}
    </div>
</footer>
